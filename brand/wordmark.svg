<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- white background -->
  <rect width="1500" height="500" fill="#FFFFFF"/>

  <!-- ===== shield mark (no box), vertically centered ===== -->
  <g transform="translate(190,98) scale(0.60)">
    <path d="M256 96 L386 142 V268 C386 350 326 398 256 424 C186 398 126 350 126 268 V142 Z"
          fill="none" stroke="#0B2237" stroke-width="22" stroke-linejoin="round"/>
    <g stroke="#0B2237" stroke-width="18" stroke-linecap="round" opacity="0.92">
      <line x1="196" y1="206" x2="316" y2="206"/>
      <line x1="196" y1="246" x2="316" y2="246"/>
      <line x1="196" y1="286" x2="316" y2="286"/>
    </g>
    <circle cx="320" cy="304" r="64" fill="#FFFFFF"/>
    <circle cx="320" cy="304" r="56" fill="url(#teal)"/>
    <path d="M294 304 L312 324 L348 284" fill="none" stroke="#FFFFFF" stroke-width="20"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== wordmark (balanced gap from the mark) ===== -->
  <text x="450" y="262" font-family="'Helvetica Neue', Arial, sans-serif" font-size="120"
        font-weight="700" letter-spacing="-2">
    <tspan fill="#0B2237">Clause</tspan><tspan fill="#14B8A6">Keeper</tspan>
  </text>
  <text x="454" y="328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36"
        font-weight="500" letter-spacing="5.5" fill="#5B7488">ALWAYS-CURRENT LEGAL DOCUMENTS</text>
</svg>
