{% extends "base.html" %}
{% block title %}{{ doc.title }} — {{ policy.business_name }}{% endblock %}
{% block content %}
<section class="legal-doc" id="doc-export-{{ doc_key }}">
  <p class="fine"><a href="/p/{{ policy.id }}">← Back to {{ policy.business_name }} policy set</a></p>
  <div class="alert info">⚠️ <strong>Not legal advice.</strong> {{ disclaimer }}</div>
  <div class="doc-actions">
    <button class="btn btn-ghost btn-small" type="button" onclick="ckCopyHtml('doc-export-{{ doc_key }}')">Copy HTML</button>
    <button class="btn btn-ghost btn-small" type="button" onclick="ckDownloadHtml('doc-export-{{ doc_key }}','clausekeeper-{{ policy.id }}-{{ doc_key }}.html')">Download .html</button>
    <button class="btn btn-primary btn-small" type="button" onclick="ckDownloadPdf()">Download PDF</button>
  </div>
  <article class="doc-body">
    {{ doc.body | safe }}
  </article>
</section>
{% endblock %}
