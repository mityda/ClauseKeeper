{% extends "base.html" %}
{% block title %}{{ doc.title }} — {{ policy.business_name }}{% endblock %}
{% block content %}
<section class="legal-doc">
  <p class="fine"><a href="/p/{{ policy.id }}">← Back to {{ policy.business_name }} policy set</a></p>
  <div class="alert info">⚠️ <strong>Not legal advice.</strong> {{ disclaimer }}</div>
  <article class="doc-body">
    {{ doc.body | safe }}
  </article>
</section>
{% endblock %}
